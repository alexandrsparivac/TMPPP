services:
  db:
    image: mongo:latest
    container_name: student_helper_db
    restart: always
    environment:
      MONGO_INITDB_DATABASE: student_helper_bot
    volumes:
      - mongo_data:/data/db
    ports:
      - "27018:27017"

  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: student_helper_bot
    restart: always
    env_file:
      - ../.env
    environment:
      - MONGODB_URI=mongodb://db:27017/student_helper_bot
      - DEBUG=True
      - LOG_LEVEL=INFO
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      - db

volumes:
  mongo_data:
